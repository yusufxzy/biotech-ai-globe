// Triangulate a ring of [lng, lat] coords into face indices using earcut
function triangulateRing(ring) {
  let coords = ring;
  // Remove duplicate closing point
  if (coords.length > 1 && coords[0][0] === coords[coords.length-1][0] && coords[0][1] === coords[coords.length-1][1]) {
    coords = coords.slice(0, -1);
  }
  if (coords.length < 3) return { indices: [], coords };
  // Handle antimeridian
  let hasAM = false;
  for (let i = 0; i < coords.length - 1; i++) {
    if (Math.abs(coords[i][0] - coords[i+1][0]) > 180) { hasAM = true; break; }
  }
  // Flatten to 2D for earcut
  const flat = [];
  coords.forEach(c => { flat.push(hasAM && c[0] < 0 ? c[0] + 360 : c[0], c[1]); });
  const indices = earcut(flat);
  return { indices, coords };
}

function ll2v(lat, lng, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lng + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -(radius * Math.sin(phi) * Math.cos(theta)),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

function formatFunding(f) {
  if (f == null) return 'Undisclosed';
  if (f >= 1000) return '$' + (f / 1000).toFixed(1) + 'B';
  return '$' + f.toFixed(0) + 'M';
}

// ─── COUNTRIES ───
const countryGroups = [];
let countryFeatures = [];
let elevatedCountry = null;

function buildCountryMeshes(features) {
  countryFeatures = features;
  const R_BASE = 1.003;
  const R_TOP = 1.038;
  const theme = THEMES[currentTheme];

  features.forEach((feature, fi) => {
    const group = new THREE.Group();
    group.userData = { featureIndex: fi, elevation: 0, targetElevation: 0 };

    const coords = [];
    if (feature.geometry.type === 'Polygon') {
      coords.push(...feature.geometry.coordinates);
    } else if (feature.geometry.type === 'MultiPolygon') {
      feature.geometry.coordinates.forEach(poly => coords.push(...poly));
    }

    const outlineMat = new THREE.LineBasicMaterial({ color: theme.outline.color, transparent: true, opacity: theme.outline.opacity });
    const glowMat = new THREE.LineBasicMaterial({ color: theme.glow.color, transparent: true, opacity: theme.glow.opacity, linewidth: 2 });
    const highlightMat = new THREE.MeshBasicMaterial({ color: theme.highlight, transparent: true, opacity: 0, side: THREE.DoubleSide });
    const wallMat = new THREE.MeshBasicMaterial({ color: theme.highlight, transparent: true, opacity: 0, side: THREE.DoubleSide });

    const outlineLines = [];
    const glowLines = [];
    const topMeshes = [];
    const wallMeshes = [];

    coords.forEach(ring => {
      if (ring.length < 3) return;
      const pts = [];
      ring.forEach(coord => {
        pts.push(ll2v(coord[1], coord[0], R_BASE));
      });

      // Outline — split into segments to avoid antimeridian streaks
      const segments = [];
      let currentSeg = [pts[0]];
      for (let i = 1; i < ring.length; i++) {
        if (Math.abs(ring[i][0] - ring[i-1][0]) > 90) {
          if (currentSeg.length > 1) segments.push(currentSeg);
          currentSeg = [pts[i]];
        } else {
          currentSeg.push(pts[i]);
        }
      }
      if (currentSeg.length > 1) segments.push(currentSeg);

      segments.forEach(seg => {
        const geom = new THREE.BufferGeometry().setFromPoints(seg);
        outlineLines.push(new THREE.Line(geom, outlineMat));
        glowLines.push(new THREE.Line(geom.clone(), glowMat));
      });

      // Build wall geometry (for elevation effect)
      // We'll create it but keep it invisible until elevated
      const wallVerts = [];
      const wallIndices = [];
      for (let i = 0; i < pts.length - 1; i++) {
        // Skip segments crossing antimeridian (Alaska etc)
        if (Math.abs(ring[i][0] - ring[i+1][0]) > 90) continue;
        const base = wallVerts.length / 3;
        const bP = pts[i];
        const tP = ll2v(ring[i][1], ring[i][0], R_TOP);
        const bN = pts[i + 1];
        const tN = ll2v(ring[i + 1][1], ring[i + 1][0], R_TOP);
        wallVerts.push(bP.x, bP.y, bP.z, tP.x, tP.y, tP.z, bN.x, bN.y, bN.z, tN.x, tN.y, tN.z);
        wallIndices.push(base, base + 1, base + 2, base + 1, base + 3, base + 2);
      }
      if (wallVerts.length > 0) {
        const wGeom = new THREE.BufferGeometry();
        wGeom.setAttribute('position', new THREE.Float32BufferAttribute(wallVerts, 3));
        wGeom.setIndex(wallIndices);
        wGeom.computeVertexNormals();
        wallMeshes.push(new THREE.Mesh(wGeom, wallMat));
      }

      // Top cap — earcut triangulation for concave polygons
      if (ring.length > 3) {
        const { indices, coords: rc } = triangulateRing(ring);
        if (indices.length > 0) {
          const topPts = rc.map(c => ll2v(c[1], c[0], R_TOP));
          const capVerts = [];
          topPts.forEach(p => capVerts.push(p.x, p.y, p.z));
          const capGeom = new THREE.BufferGeometry();
          capGeom.setAttribute('position', new THREE.Float32BufferAttribute(capVerts, 3));
          capGeom.setIndex(indices);
          capGeom.computeVertexNormals();
          topMeshes.push(new THREE.Mesh(capGeom, highlightMat));
        }
      }
    });

    outlineLines.forEach(l => group.add(l));
    glowLines.forEach(l => group.add(l));
    wallMeshes.forEach(m => { m.visible = false; group.add(m); });
    topMeshes.forEach(m => { m.visible = false; group.add(m); });

    group.userData.outlineMat = outlineMat;
    group.userData.glowMat = glowMat;
    group.userData.highlightMat = highlightMat;
    group.userData.wallMat = wallMat;
    group.userData.wallMeshes = wallMeshes;
    group.userData.topMeshes = topMeshes;
    group.userData.outlineLines = outlineLines;
    group.userData.glowLines = glowLines;
    group.userData.coords = coords;

    globeGroup.add(group);
    countryGroups.push(group);
  });
}

function updateCountryElevation(group, t) {
  // t: 0 to 1
  const R_BASE = 1.003;
  const R_TOP_MIN = 1.003;
  const R_TOP_MAX = 1.038;
  const rTop = R_BASE + (R_TOP_MAX - R_BASE) * t;
  const theme = THEMES[currentTheme];

  const { wallMeshes, topMeshes, coords, wallMat, highlightMat } = group.userData;

  wallMat.opacity = t * 0.4;
  highlightMat.opacity = t * 0.85;

  wallMeshes.forEach(m => { m.visible = t > 0.01; });
  topMeshes.forEach(m => { m.visible = t > 0.01; });

  // Rebuild wall and top geometry from scratch at current height
  // Remove old meshes
  wallMeshes.forEach(m => { group.remove(m); m.geometry.dispose(); });
  topMeshes.forEach(m => { group.remove(m); m.geometry.dispose(); });
  wallMeshes.length = 0;
  topMeshes.length = 0;

  if (t < 0.005) return; // Don't build geometry when flat

  coords.forEach(ring => {
    if (ring.length < 3) return;

    // Wall
    const wallVerts = [];
    const wallIdx = [];
    for (let i = 0; i < ring.length - 1; i++) {
      if (Math.abs(ring[i][0] - ring[i+1][0]) > 90) continue;
      const base = wallVerts.length / 3;
      const bP = ll2v(ring[i][1], ring[i][0], R_BASE);
      const tP = ll2v(ring[i][1], ring[i][0], rTop);
      const bN = ll2v(ring[i+1][1], ring[i+1][0], R_BASE);
      const tN = ll2v(ring[i+1][1], ring[i+1][0], rTop);
      wallVerts.push(bP.x,bP.y,bP.z, tP.x,tP.y,tP.z, bN.x,bN.y,bN.z, tN.x,tN.y,tN.z);
      wallIdx.push(base,base+1,base+2, base+1,base+3,base+2);
    }
    if (wallVerts.length > 0) {
      const wg = new THREE.BufferGeometry();
      wg.setAttribute('position', new THREE.Float32BufferAttribute(wallVerts, 3));
      wg.setIndex(wallIdx);
      const wm = new THREE.Mesh(wg, wallMat);
      group.add(wm);
      wallMeshes.push(wm);
    }

    // Top cap — earcut triangulation for concave polygons
    if (ring.length > 3) {
      const { indices, coords: rc } = triangulateRing(ring);
      if (indices.length > 0) {
        const topPts = rc.map(c => ll2v(c[1], c[0], rTop));
        const capV = [];
        topPts.forEach(p => capV.push(p.x, p.y, p.z));
        const cg = new THREE.BufferGeometry();
        cg.setAttribute('position', new THREE.Float32BufferAttribute(capV, 3));
        cg.setIndex(indices);
        const cm = new THREE.Mesh(cg, highlightMat);
        group.add(cm);
        topMeshes.push(cm);
      }
    }
  });

  // Update outline lines to sit on top
  const outlineR = R_BASE + (rTop - R_BASE);
  let lIdx = 0;
  if (t > 0.01) {
    coords.forEach(ring => {
      if (ring.length < 3) return;
      if (lIdx < group.userData.outlineLines.length) {
        const pts = ring.map(c => ll2v(c[1], c[0], rTop));
        const posAttr = group.userData.outlineLines[lIdx].geometry.getAttribute('position');
        const arr = [];
        pts.forEach(p => arr.push(p.x, p.y, p.z));
        if (posAttr && arr.length / 3 === posAttr.count) {
          posAttr.array.set(arr);
          posAttr.needsUpdate = true;
        }
        // Same for glow
        const gPosAttr = group.userData.glowLines[lIdx].geometry.getAttribute('position');
        if (gPosAttr && arr.length / 3 === gPosAttr.count) {
          gPosAttr.array.set(arr);
          gPosAttr.needsUpdate = true;
        }
        lIdx++;
      }
    });
    group.userData.outlineMat.color.setHex(theme.highlight);
    group.userData.outlineMat.opacity = 1.0;
    group.userData.glowMat.color.setHex(theme.highlight);
    group.userData.glowMat.opacity = 0.6;
  } else {
    group.userData.outlineMat.color.setHex(theme.outline.color);
    group.userData.outlineMat.opacity = theme.outline.opacity;
    group.userData.glowMat.color.setHex(theme.glow.color);
    group.userData.glowMat.opacity = theme.glow.opacity;
    // Reset lines to base
    coords.forEach(ring => {
      if (ring.length < 3) return;
      if (lIdx < group.userData.outlineLines.length) {
        const pts = ring.map(c => ll2v(c[1], c[0], R_BASE));
        const posAttr = group.userData.outlineLines[lIdx].geometry.getAttribute('position');
        const arr = [];
        pts.forEach(p => arr.push(p.x, p.y, p.z));
        if (posAttr && arr.length / 3 === posAttr.count) {
          posAttr.array.set(arr);
          posAttr.needsUpdate = true;
        }
        const gPosAttr = group.userData.glowLines[lIdx].geometry.getAttribute('position');
        if (gPosAttr && arr.length / 3 === gPosAttr.count) {
          gPosAttr.array.set(arr);
          gPosAttr.needsUpdate = true;
        }
        lIdx++;
      }
    });
  }
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltipEl = document.getElementById('tooltip');
let hoveredMarker = null;
let lastInteraction = Date.now();

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  lastInteraction = Date.now();

  // Tooltip positioning
  tooltipEl.style.left = (e.clientX + 14) + 'px';
  tooltipEl.style.top = (e.clientY + 14) + 'px';

  // Raycast markers — use glow spheres for larger hit area
  raycaster.setFromCamera(mouse, camera);
  const visibleMarkers = markers.filter(m => m.visible);
  const hitTargets = visibleMarkers.map(m => m.children[1]); // glow sphere = 3x radius
  const hits = raycaster.intersectObjects(hitTargets, false);

  if (hits.length > 0) {
    const marker = hits[0].object.parent;
    if (hoveredMarker !== marker) {
      if (hoveredMarker) unhoverMarker(hoveredMarker);
      hoveredMarker = marker;
      hoverMarker(marker);
    }
    renderer.domElement.style.cursor = 'pointer';
  } else {
    if (hoveredMarker) {
      unhoverMarker(hoveredMarker);
      hoveredMarker = null;
    }
    tooltipEl.style.opacity = '0';
    renderer.domElement.style.cursor = 'grab';
  }
});

function hoverMarker(m) {
  m.userData.hovered = true;
  const c = m.userData.company;
  const tc = TYPE_COLORS[c.companyType];
  tooltipEl.innerHTML = `
    <div class="tt-name">${c.name}</div>

    <div class="tt-funding">${formatFunding(c.funding)}</div>

}

}

// Click
renderer.domElement.addEventListener('click', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Check markers first — use glow spheres (children[1]) for larger hit area
  const visibleMarkers = markers.filter(m => m.visible);
  const hitTargets = visibleMarkers.map(m => m.children[1]); // glow sphere = 3x radius
  const markerHits = raycaster.intersectObjects(hitTargets, false);

  if (markerHits.length > 0) {
    const marker = markerHits[0].object.parent;
    openDetail(marker.userData.company);
    return;
  }

  // Check globe for country click
  const globeHits = raycaster.intersectObject(globeMesh);
  if (globeHits.length > 0) {
    const pt = globeHits[0].point;
    // Convert to lat/lng
    const local = globeGroup.worldToLocal(pt.clone());
    const r = local.length();
    const lat = 90 - (Math.acos(local.y / r) * 180 / Math.PI);
    const lng = -(Math.atan2(-local.z, -local.x) * 180 / Math.PI) - 180;
    const lngNorm = ((lng + 540) % 360) - 180;

    // Check which country contains this point
    let foundIdx = -1;
    for (let i = 0; i < countryFeatures.length; i++) {
      if (d3.geoContains(countryFeatures[i], [lngNorm, lat])) {
        foundIdx = i;
        break;
      }
    }

    if (foundIdx >= 0) {
      // Deselect previous
      if (elevatedCountry !== null && elevatedCountry !== foundIdx) {
        countryGroups[elevatedCountry].userData.targetElevation = 0;
      }
      // Toggle
      if (elevatedCountry === foundIdx) {
        countryGroups[foundIdx].userData.targetElevation = 0;
        elevatedCountry = null;
      } else {
        countryGroups[foundIdx].userData.targetElevation = 1;
        elevatedCountry = foundIdx;
      }
    } else {
      // Clicked empty ocean — deselect
      if (elevatedCountry !== null) {
        countryGroups[elevatedCountry].userData.targetElevation = 0;
        elevatedCountry = null;
      }
    }
    closeDetail();
  }
});

// ─── ANIMATION LOOP ───
function animate() {
  requestAnimationFrame(animate);

  controls.update();

  // Auto-rotate
  if (Date.now() - lastInteraction > 4000) {
    globeGroup.rotation.y += 0.0008;
  }

  // Animate country elevations
  countryGroups.forEach(g => {
    const d = g.userData;
    if (Math.abs(d.elevation - d.targetElevation) > 0.001) {
      d.elevation += (d.targetElevation - d.elevation) * 0.06;
      if (Math.abs(d.elevation - d.targetElevation) < 0.001) d.elevation = d.targetElevation;
      updateCountryElevation(g, d.elevation);
    }
  });

  // Animate markers hover
  markers.forEach(m => {
    const targetScale = m.userData.hovered ? 1.4 : 1.0;
    const currentScale = m.scale.x;
    const newScale = currentScale + (targetScale - currentScale) * 0.12;
    m.scale.setScalar(newScale);

    // Ripple ring
    if (m.userData.hovered) {
      m.userData.ringMat.opacity = 0.3 + Math.sin(Date.now() * 0.005) * 0.15;
    } else {
      m.userData.ringMat.opacity *= 0.9;
    }

    // Core brightness on hover
    if (m.userData.hovered) {
      m.userData.coreMat.opacity = 1.0;
      m.userData.glowMat.opacity = 0.3;
    } else {
      m.userData.coreMat.opacity = 0.9;
      m.userData.glowMat.opacity = 0.15;
    }
  });

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
